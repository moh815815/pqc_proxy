version: "3.9"

services:
  # ── قاعدة بيانات PostgreSQL ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pqc_postgres
    environment:
      POSTGRES_USER: pqc_user
      POSTGRES_PASSWORD: pqc_pass
      POSTGRES_DB: pqc_proxy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqc_user -d pqc_proxy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── تطبيق Flask ───────────────────────────────────
  pqc_app:
    build: .
    container_name: pqc_proxy_app
    environment:
      DATABASE_URL: postgresql://pqc_user:pqc_pass@postgres:5432/pqc_proxy_db
      JWT_SECRET_KEY: "مفتاح-إنتاج-آمن-يجب-تغييره"
      FLASK_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade &&
             python seed.py &&
             gunicorn -w 4 -b 0.0.0.0:5000 run:app"

volumes:
  postgres_data:
